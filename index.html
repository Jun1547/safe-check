<script>
var photoData=[null,null,null];
var photoLabels=['시설 전경','의심 구역','특이사항'];

function previewPhoto(input,idx){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    photoData[idx]=e.target.result;
    var img=document.getElementById('prev'+idx);
    img.src=e.target.result;
    img.style.display='block';
    document.getElementById('rm'+idx).style.display='flex';
    var box=document.getElementById('box'+idx);
    box.querySelector('.ph-icon').style.display='none';
    box.querySelector('.ph-label').style.display='none';
  };
  reader.readAsDataURL(input.files[0]);
}

function removePhoto(e,idx){
  e.preventDefault();e.stopPropagation();
  photoData[idx]=null;
  var img=document.getElementById('prev'+idx);
  img.src='';img.style.display='none';
  document.getElementById('rm'+idx).style.display='none';
  var box=document.getElementById('box'+idx);
  box.querySelector('.ph-icon').style.display='block';
  box.querySelector('.ph-label').style.display='block';
  box.querySelector('input[type=file]').value='';
}

// 구글 전송 함수 (계산과 별도로 작동하게 분리)
function sendToGoogle(payload) {
  const scriptURL = "https://script.google.com/macros/s/AKfycbwSOogbnDNJkKmISm9YJY12WBXPwg-HZzOvqDS17QQWGPTfi62xNNM0H2g5jzwClNQ8/exec";
  fetch(scriptURL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).catch(err => console.error("구글 전송 실패:", err));
}

function calcGrade(){
  var fields=['r1','r2','r3','r4','r5','r6','r7','r8'];
  var score=0, missing=false;
  
  fields.forEach(function(n){
    var el=document.querySelector('input[name='+n+']:checked');
    if(el) score+=parseInt(el.value); else missing=true;
  });

  // 점검자 구분 체크 확인
  var ins=document.querySelector('input[name=inspector]:checked');
  if(!ins) missing=true;

  if(missing){
    alert('모든 필수 항목(*)을 선택해 주세요.');
    return;
  }

  var date=document.getElementById('f-date').value||'미입력';
  var time=document.getElementById('f-time').value||'미입력';
  var place=document.getElementById('f-place').value||'미입력';
  var name=document.getElementById('f-name').value||'미입력';
  var insVal=ins.value;
  var memo=document.getElementById('f-memo').value||'없음';

  var grade, msg, cls;
  if(score>=70){grade='A등급 (안심)'; cls='grade-A'; msg='안심 인증 스티커 부착 대상';}
  else if(score>=50){grade='B등급 (양호)'; cls='grade-B'; msg='경미한 보완 권고';}
  else{grade='C등급 (취약)'; cls='grade-C'; msg='구청 즉시 통보 및 환경개선';}

  // 결과 화면 먼저 띄우기 (이게 안 나오면 코드 오류임)
  document.getElementById('result-box').style.display='block';
  document.getElementById('result-score').textContent=score+'점 / 100점';
  document.getElementById('result-grade').innerHTML='<span class="grade-badge '+cls+'">'+grade+'</span>';
  document.getElementById('result-msg').textContent=msg;
  document.getElementById('result-detail').innerHTML=
    '<strong>시설명:</strong> '+place+'<br><strong>점검자:</strong> '+insVal+' ('+name+')';

  var ph='';
  photoData.forEach(function(d,i){
    if(d)ph+='<div class="r-photo-item"><img src="'+d+'"><p>'+photoLabels[i]+'</p></div>';
  });
  document.getElementById('result-photos').innerHTML=ph;

  // 결과 창으로 이동
  document.getElementById('result-box').scrollIntoView({behavior:'smooth'});

  // 마지막에 구글로 데이터 쏘기
  sendToGoogle({
    date: date, time: time, place: place, inspector: insVal,
    name: name, score: score, grade: grade, memo: memo
  });
}
</script>
