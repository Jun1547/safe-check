<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>불법촬영 현장점검표</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f4f6fb;font-family:'맑은 고딕',sans-serif;padding:1.5rem 1rem;}
  .wrap{max-width:600px;margin:0 auto;}
  .header{background:#1A3C6E;border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1.5rem;}
  .header h1{color:#fff;font-size:20px;font-weight:600;margin-bottom:4px;}
  .header p{color:#AECBF0;font-size:15px;}
  .section{background:#fff;border:1px solid #e0e6f0;border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1rem;}
  .section-title{font-size:15px;font-weight:600;color:#1A3C6E;border-left:3px solid #1A3C6E;padding-left:8px;margin-bottom:1rem;}
  .field{margin-bottom:1.1rem;}
  .field label{display:block;font-size:15px;color:#555;margin-bottom:6px;}
  .field input[type=text],.field input[type=date],.field input[type=time],.field textarea{width:100%;padding:9px 11px;border:1px solid #d0d8e8;border-radius:8px;font-size:16px;color:#222;background:#f9fafc;font-family:'맑은 고딕',sans-serif;}
  .field textarea{resize:vertical;min-height:80px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .radio-group{display:flex;gap:8px;flex-wrap:wrap;}
  .radio-group label{display:flex;align-items:center;gap:6px;padding:7px 15px;border:1px solid #d0d8e8;border-radius:20px;font-size:15px;cursor:pointer;color:#333;background:#f9fafc;transition:all 0.15s;}
  .radio-group label:hover{border-color:#1A3C6E;background:#eef3fb;}
  .radio-group input[type=radio]{accent-color:#1A3C6E;}
  .grade-guide{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
  .guide-item{padding:10px;border-radius:8px;text-align:center;}
  .g-label{font-size:15px;font-weight:600;}
  .g-score{font-size:13px;margin-top:3px;}
  .g-desc{font-size:13px;margin-top:2px;}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px;}
  .photo-box{position:relative;border:1.5px dashed #b0bdd4;border-radius:10px;background:#f4f7fc;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
  .photo-box:hover{border-color:#1A3C6E;background:#eef3fb;}
  .photo-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .ph-icon{font-size:22px;color:#aab8d0;margin-bottom:4px;pointer-events:none;}
  .ph-label{font-size:13px;color:#888;text-align:center;padding:0 4px;line-height:1.4;pointer-events:none;}
  .photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:9px;display:none;}
  .ph-remove{display:none;position:absolute;top:4px;right:4px;background:#c0392b;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;z-index:2;align-items:center;justify-content:center;}
  .submit-btn{width:100%;padding:14px;background:#1A3C6E;color:#fff;border:none;border-radius:10px;font-size:18px;font-family:'맑은 고딕',sans-serif;cursor:pointer;margin-top:0.5rem;font-weight:600;letter-spacing:1px;}
  .submit-btn:hover{background:#15305a;}
  .result-box{display:none;background:#f0f4fb;border:1px solid #c8d8f0;border-radius:12px;padding:1.5rem;margin-top:1rem;text-align:center;}
  .r-label{font-size:15px;color:#666;margin-bottom:6px;}
  .r-score{font-size:30px;font-weight:700;color:#1A3C6E;}
  .grade-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:16px;font-weight:600;margin:10px 0 6px;}
  .grade-A{background:#EAF3DE;color:#3B6D11;}
  .grade-B{background:#E6F1FB;color:#185FA5;}
  .grade-C{background:#FAEEDA;color:#854F0B;}
  .r-msg{font-size:15px;color:#555;margin-top:4px;}
  .r-detail{margin-top:16px;text-align:left;background:#fff;border-radius:8px;padding:12px 14px;font-size:15px;color:#333;line-height:2.2;}
  .r-detail strong{color:#1A3C6E;}
  .r-photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
  .r-photo-item img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid #d0d8e8;}
  .print-btn{display:inline-block;margin-top:14px;padding:8px 20px;background:#fff;border:1px solid #1A3C6E;border-radius:8px;color:#1A3C6E;font-size:15px;cursor:pointer;}
  .required{color:#c0392b;}
  @media print{
    body{background:#fff;padding:0;}
    .submit-btn,.print-btn,.ph-remove{display:none !important;}
    .result-box{display:block !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>불법촬영 현장점검표</h1>
    <p>서울도봉경찰서 성폭력 전문예방팀 × 도봉구청 점검단</p>
  </div>

  <div class="section">
    <div class="section-title">등급 기준 안내</div>
    <div class="grade-guide">
      <div class="guide-item" style="background:#EAF3DE;"><div class="g-label" style="color:#3B6D11;">A (안심)</div><div class="g-score" style="color:#3B6D11;">70점↑</div></div>
      <div class="guide-item" style="background:#E6F1FB;"><div class="g-label" style="color:#185FA5;">B (양호)</div><div class="g-score" style="color:#185FA5;">50~69</div></div>
      <div class="guide-item" style="background:#FAEEDA;"><div class="g-label" style="color:#854F0B;">C (취약)</div><div class="g-score" style="color:#854F0B;">49점↓</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">기본 정보</div>
    <div class="row2">
      <div class="field"><label>점검 일자 <span class="required">*</span></label><input type="date" id="f-date"></div>
      <div class="field"><label>점검 시간 <span class="required">*</span></label><input type="time" id="f-time"></div>
    </div>
    <div class="field"><label>시설명 <span class="required">*</span></label><input type="text" id="f-place" placeholder="시설명 입력"></div>
    <div class="field"><label>점검자 구분 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="inspector" value="전문점검단"> 전문점검단</label>
        <label><input type="radio" name="inspector" value="시민감시단"> 시민감시단</label>
      </div>
    </div>
    <div class="field"><label>점검자 이름</label><input type="text" id="f-name" placeholder="이름 입력"></div>
  </div>

  <div class="section">
    <div class="section-title">점검 항목 (각 항목 선택 필수)</div>
    <div class="field"><label>1. 전파 탐지기 이상 유무 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r1" value="15"> 이상없음</label><label><input type="radio" name="r1" value="7"> 의심</label><label><input type="radio" name="r1" value="0"> 이상있음</label>
      </div>
    </div>
    <div class="field"><label>2. 렌즈 탐지기 이상 유무 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r2" value="15"> 이상없음</label><label><input type="radio" name="r2" value="7"> 의심</label><label><input type="radio" name="r2" value="0"> 이상있음</label>
      </div>
    </div>
    <div class="field"><label>3. CCTV 사각지대 여부 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r3" value="10"> 없음</label><label><input type="radio" name="r3" value="5"> 일부</label><label><input type="radio" name="r3" value="0"> 다수</label>
      </div>
    </div>
    <div class="field"><label>4. 은폐 가능 구조물 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r4" value="10"> 없음</label><label><input type="radio" name="r4" value="5"> 일부</label><label><input type="radio" name="r4" value="0"> 다수</label>
      </div>
    </div>
    <div class="field"><label>5. 구멍 및 훼손 여부 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r8" value="10"> 없음</label><label><input type="radio" name="r8" value="5"> 일부</label><label><input type="radio" name="r8" value="0"> 다수</label>
      </div>
    </div>
    <div class="field"><label>6. 점검 이력 관리 여부 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r5" value="10"> 관리됨</label><label><input type="radio" name="r5" value="0"> 미관리</label>
      </div>
    </div>
    <div class="field"><label>7. 시설 청결 및 조명 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r6" value="10"> 양호</label><label><input type="radio" name="r6" value="5"> 보통</label><label><input type="radio" name="r6" value="0"> 불량</label>
      </div>
    </div>
    <div class="field"><label>8. 시설 노후도 <span class="required">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="r7" value="20"> 양호</label><label><input type="radio" name="r7" value="10"> 보통</label><label><input type="radio" name="r7" value="0"> 노후</label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">특이사항 및 사진</div>
    <div class="field"><textarea id="f-memo" placeholder="특이사항 기록"></textarea></div>
    <div class="photo-grid">
        <div class="photo-box" id="box0"><input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,0)"><div class="ph-icon">📷</div><img id="prev0"><button class="ph-remove" id="rm0" onclick="removePhoto(event,0)">✕</button></div>
        <div class="photo-box" id="box1"><input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,1)"><div class="ph-icon">📷</div><img id="prev1"><button class="ph-remove" id="rm1" onclick="removePhoto(event,1)">✕</button></div>
        <div class="photo-box" id="box2"><input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,2)"><div class="ph-icon">📷</div><img id="prev2"><button class="ph-remove" id="rm2" onclick="removePhoto(event,2)">✕</button></div>
    </div>
  </div>

  <button class="submit-btn" onclick="calcGrade()">점검 완료 · 등급 확인</button>

  <div class="result-box" id="result-box">
    <div class="r-label">총점</div>
    <div class="r-score" id="result-score"></div>
    <div id="result-grade"></div>
    <div class="r-msg" id="result-msg"></div>
    <div class="r-detail" id="result-detail"></div>
    <div class="r-photos" id="result-photos"></div>
    <button class="print-btn" onclick="window.print()">결과 인쇄 / 저장</button>
  </div>
</div>

<script>
var photoData=[null,null,null];
function previewPhoto(input,idx){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    photoData[idx]=e.target.result;
    var img=document.getElementById('prev'+idx);
    img.src=e.target.result; img.style.display='block';
    document.getElementById('rm'+idx).style.display='flex';
  };
  reader.readAsDataURL(input.files[0]);
}
function removePhoto(e,idx){
  e.preventDefault(); e.stopPropagation();
  photoData[idx]=null;
  var img=document.getElementById('prev'+idx);
  img.src=''; img.style.display='none';
  document.getElementById('rm'+idx).style.display='none';
}

function sendToGoogle(p) {
  fetch("https://script.google.com/macros/s/AKfycbwSOogbnDNJkKmISm9YJY12WBXPwg-HZzOvqDS17QQWGPTfi62xNNM0H2g5jzwClNQ8/exec", {
    method: "POST", mode: "no-cors", body: JSON.stringify(p)
  });
}

function calcGrade(){
  var score=0, missing=false;
  ['r1','r2','r3','r4','r5','r6','r7','r8'].forEach(function(n){
    var el=document.querySelector('input[name='+n+']:checked');
    if(el) score+=parseInt(el.value); else missing=true;
  });
  var ins=document.querySelector('input[name=inspector]:checked');
  if(missing || !ins || !document.getElementById('f-date').value || !document.getElementById('f-place').value){
    alert('필수 항목(*)을 모두 입력해 주세요.'); return;
  }

  var g, m, c;
  if(score>=70){g='A등급 (안심)'; c='grade-A'; m='안심 인증 대상';}
  else if(score>=50){g='B등급 (양호)'; c='grade-B'; m='보완 권고';}
  else{g='C등급 (취약)'; c='grade-C'; m='즉시 개선 대상';}

  document.getElementById('result-box').style.display='block';
  document.getElementById('result-score').textContent=score+'점';
  document.getElementById('result-grade').innerHTML='<span class="grade-badge '+c+'">'+g+'</span>';
  document.getElementById('result-msg').textContent=m;
  document.getElementById('result-detail').innerHTML='<strong>시설명:</strong> '+document.getElementById('f-place').value+'<br><strong>점검자:</strong> '+ins.value;

  sendToGoogle({
    date: document.getElementById('f-date').value,
    time: document.getElementById('f-time').value,
    place: document.getElementById('f-place').value,
    inspector: ins.value,
    name: document.getElementById('f-name').value,
    score: score, grade: g, memo: document.getElementById('f-memo').value
  });
  
  alert('구글 시트 저장 및 계산 완료!');
  document.getElementById('result-box').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
